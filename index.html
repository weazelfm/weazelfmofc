<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weazel FM, A rádio da cidade</title>
    <link rel="icon" type="image/png" href="ChatGPT Image 12 de mai. de 2026, 15_45_01.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #cc0000; --bg-dark: #0f1014; --card-bg: #1c1e26; --text-gray: #a0a0a0; --gold: #ffd700; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; overflow-x: hidden; }
        
        .top-bar { background: rgba(0,0,0,0.9); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d37; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-main img { height: 55px; cursor: pointer; }
        
        .main-layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 30px; padding: 20px; }
        .sidebar-widget { background: var(--card-bg); border: 1px solid #2a2d37; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        .widget-title { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }

        /* PERFIL DO CRIMINOSO */
        .criminal-profile { background: #111; border: 2px solid var(--primary); border-radius: 12px; padding: 40px; text-align: center; position: relative; }
        .profile-img { width: 250px; height: 250px; border: 5px solid #333; object-fit: cover; margin-bottom: 20px; }
        .profile-name { font-family: 'Oswald'; font-size: 3rem; text-transform: uppercase; margin: 10px 0; }
        .profile-detail { background: #1c1e26; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid var(--primary); text-align: left; }
        
        /* LISTA ADMIN */
        .admin-list-item { background: #0a0a0a; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; font-size: 0.8rem; }
        .btn-edit { background: #2196F3; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-family: 'Oswald'; }
        
        .hidden { display: none; }
        input, textarea, select { width: 100%; background: #0f1014; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-publish { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: 800; cursor: pointer; font-family: 'Oswald'; text-transform: uppercase; }
        
        .procurado-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #2a2d37; padding-bottom: 10px; cursor: pointer; }
        .procurado-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-main" onclick="window.location.reload()">
            <img src="ChatGPT Image 12 de mai. de 2026, 15_45_01.png" alt="WEAZEL FM">
        </div>
        <button class="login-btn" id="auth-btn" onclick="handleAuth()" style="background: #2a2d37; color: #fff; border: 1px solid #444; padding: 6px 15px; cursor: pointer;">PAINEL WFM</button>
    </div>

    <div class="main-layout">
        <main>
            <div id="pagina-home"><div id="feed-page"></div></div>

            <div id="pagina-perfil-procurado" class="hidden">
                <button onclick="voltarHome()" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer; margin-bottom:20px; font-family:'Oswald'">MURAL DE NOTÍCIAS</button>
                <div id="perfil-meliante" class="criminal-profile"></div>
            </div>

            <div id="editor-page" class="hidden">
                <div style="background:var(--card-bg); padding:30px; border-radius:8px; border:1px solid #333">
                    <h2 style="font-family:'Oswald'">GERENCIAR PROCURADOS</h2>
                    <form id="form-procurado">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="w-name" placeholder="Nome do Meliante" required>
                        <input type="text" id="w-status" placeholder="Status (ex: Procurado / Preso / Procurado Vivo)" required>
                        <input type="text" id="w-crime" placeholder="Crime Cometido" required>
                        <input type="text" id="w-reward" placeholder="Recompensa ($)">
                        <textarea id="w-desc" placeholder="Descrição do indivíduo..."></textarea>
                        <input type="url" id="w-img" placeholder="URL da Foto">
                        <button type="submit" id="btn-save-w" class="btn-publish">Registrar Criminoso</button>
                    </form>
                    
                    <hr style="margin:30px 0; border:0; border-top:1px solid #333">
                    <h3 style="font-family:'Oswald'">LISTA DE CADASTROS</h3>
                    <div id="admin-wanted-list"></div>
                    <button onclick="voltarHome()" style="width:100%; margin-top:20px; padding:10px; background:#333; color:white; border:none; cursor:pointer">SAIR DO PAINEL</button>
                </div>
            </div>
        </main>

        <aside class="sidebar" id="main-sidebar">
            <div class="sidebar-widget">
                <div class="widget-title">🚨 LISTA NEGRA</div>
                <div id="wanted-container"></div>
            </div>
        </aside>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTYu6dC3Iyz-qtjHKvLaq-B_4qXMb1C4w",
            authDomain: "weazelfm-dfb2e.firebaseapp.com",
            databaseURL: "https://weazelfm-dfb2e-default-rtdb.firebaseio.com",
            projectId: "weazelfm-dfb2e",
            storageBucket: "weazelfm-dfb2e.firebasestorage.app",
            messagingSenderId: "70517176119",
            appId: "1:70517176119:web:523e4e13cfedd0e0018cb2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isLogged = false;
        const PASS = "andrewgallowaywfm";

        function handleAuth() {
            if (isLogged) { showPage('editor'); } 
            else {
                if (prompt("Senha:") === PASS) { isLogged = true; showPage('editor'); }
            }
        }

        function showPage(page) {
            document.getElementById('pagina-home').classList.toggle('hidden', page !== 'feed');
            document.getElementById('pagina-perfil-procurado').classList.toggle('hidden', page !== 'perfil');
            document.getElementById('editor-page').classList.toggle('hidden', page !== 'editor');
            document.getElementById('main-sidebar').classList.toggle('hidden', page === 'editor' || page === 'perfil');
        }

        // SALVAR OU ATUALIZAR PROCURADO
        document.getElementById('form-procurado').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('w-name').value,
                status: document.getElementById('w-status').value,
                crime: document.getElementById('w-crime').value,
                reward: document.getElementById('w-reward').value,
                desc: document.getElementById('w-desc').value,
                img: document.getElementById('w-img').value || 'https://via.placeholder.com/250'
            };

            if(id) {
                db.ref('wanted/' + id).update(data);
                alert("Ficha criminal atualizada!");
            } else {
                db.ref('wanted').push(data);
                alert("Novo criminoso adicionado!");
            }
            
            this.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('btn-save-w').innerText = "Registrar Criminoso";
        };

        // CARREGA LISTA NA SIDEBAR E NO ADMIN
        db.ref('wanted').on('value', s => {
            const list = s.val() || {};
            const cont = document.getElementById('wanted-container');
            const adminCont = document.getElementById('admin-wanted-list');
            cont.innerHTML = ''; adminCont.innerHTML = '';

            Object.keys(list).forEach(k => {
                const w = list[k];
                // Renderiza Sidebar
                cont.innerHTML += `
                    <div class="procurado-item" onclick="abrirPerfil('${k}')">
                        <img src="${w.img}" class="procurado-img">
                        <div class="procurado-info">
                            <h4 style="margin:0; font-size:0.9rem">${w.name}</h4>
                            <div style="font-size:0.7rem; color:#f44; font-weight:bold">${w.status}</div>
                        </div>
                    </div>`;
                
                // Renderiza Lista no Admin
                adminCont.innerHTML += `
                    <div class="admin-list-item">
                        <span>${w.name} (${w.status})</span>
                        <div>
                            <button class="btn-edit" onclick="prepararEdicao('${k}')">EDITAR</button>
                            <button onclick="db.ref('wanted/${k}').remove()" style="background:#600; color:white; border:none; padding:5px; cursor:pointer">X</button>
                        </div>
                    </div>`;
            });
        });

        function prepararEdicao(id) {
            db.ref('wanted/' + id).once('value', s => {
                const w = s.val();
                document.getElementById('edit-id').value = id;
                document.getElementById('w-name').value = w.name;
                document.getElementById('w-status').value = w.status;
                document.getElementById('w-crime').value = w.crime;
                document.getElementById('w-reward').value = w.reward;
                document.getElementById('w-desc').value = w.desc;
                document.getElementById('w-img').value = w.img;
                document.getElementById('btn-save-w').innerText = "ATUALIZAR CADASTRO";
                window.scrollTo(0,0);
            });
        }

        function abrirPerfil(id) {
            db.ref('wanted/'+id).once('value', s => {
                const w = s.val();
                document.getElementById('perfil-meliante').innerHTML = `
                    <img src="${w.img}" class="profile-img">
                    <h1 class="profile-name">${w.name}</h1>
                    <div style="color:#f44; font-family:'Oswald'; font-size:1.5rem; margin-bottom:20px">${w.status}</div>
                    <div style="color:var(--gold); font-family:'Oswald'; font-size:1.5rem; margin-bottom:20px">💰 RECOMPENSA: ${w.reward || 'N/A'}</div>
                    <div class="profile-detail"><b>DELITO:</b> ${w.crime}</div>
                    <div class="profile-detail"><b>HISTÓRICO:</b> ${w.desc || 'Nenhuma informação adicional.'}</div>
                `;
                showPage('perfil');
            });
        }

        function voltarHome() { showPage('feed'); }

        // Carregamento simples das notícias para não ficar vazio
        db.ref('articles').on('value', s => {
            const feed = document.getElementById('feed-page'); feed.innerHTML = '';
            const items = Object.keys(s.val() || {}).map(k => ({id:k, ...s.val()[k]})).sort((a,b)=>b.timestamp - a.timestamp);
            items.forEach(item => {
                feed.innerHTML += `<div style="background:var(--card-bg); padding:20px; margin-bottom:20px; border-radius:8px; border:1px solid #222">
                    <h2 style="font-family:'Oswald'; margin:0">${item.title}</h2>
                    <p style="color:#aaa; font-size:0.9rem">${item.content.substring(0,100)}...</p>
                </div>`;
            });
        });
    </script>
</body>
</html>
