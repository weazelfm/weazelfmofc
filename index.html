<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weazel FM - A rádio da cidade</title>
    <link rel="icon" type="image/png" href="ChatGPT Image 12 de mai. de 2026, 15_45_01.png">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --primary: #cc0000; --bg-dark: #0f1014; --card-bg: #1c1e26; --text-gray: #a0a0a0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; overflow-x: hidden; user-select: none; }

        .top-bar { background: rgba(0,0,0,0.9); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d37; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-main img { height: 55px; cursor: pointer; }
        .user-area { display: flex; align-items: center; gap: 25px; }
        .login-btn { background: #2a2d37; color: #fff; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; font-weight: bold; }
        .login-btn:hover { background: var(--primary); border-color: var(--primary); }

        .nav-container { max-width: 1200px; margin: 30px auto; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn { background: var(--card-bg); border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-family: 'Oswald'; text-transform: uppercase; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .nav-btn i { font-size: 1.1rem; }
        .nav-btn.active, .nav-btn:hover { background: var(--primary); border-color: var(--primary); }

        .main-layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 30px; padding: 0 20px; }

        .news-card { background: var(--card-bg); border-radius: 10px; border: 1px solid #2a2d37; margin-bottom: 30px; overflow: hidden; cursor: pointer; transition: 0.2s; padding: 25px; }
        .news-card:hover { border-color: var(--primary); }
        .badge { background: var(--primary); padding: 4px 12px; border-radius: 3px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; font-family: 'Oswald'; }
        .news-title { font-family: 'Oswald'; font-size: 1.8rem; margin: 10px 0; color: #fff; line-height: 1.1; }
        .news-summary { color: var(--text-gray); font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; }

        .content-body { line-height: 1.8; font-size: 1.1rem; }
        .inline-img { width: 100%; border-radius: 8px; border: 1px solid #333; margin: 20px 0; display: block; }

        .sidebar-widget { background: var(--card-bg); border: 1px solid #2a2d37; border-radius: 8px; padding: 20px; margin-bottom: 30px; margin-top: 20px; }
        .widget-title { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; font-size: 1.2rem; }
        .ad-brand { font-family: 'Oswald'; font-size: 0.9rem; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .anuncio-img { width: 100%; border-radius: 4px; border: 1px solid #333; cursor: default; }

        .procurado-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #2a2d37; padding-bottom: 10px; position: relative; }
        .procurado-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: #000; cursor: help; }
        .ficha-hover { display: none; position: absolute; right: calc(100% + 15px); top: 0; background: #0a0a0c; border: 2px solid var(--primary); padding: 15px; width: 220px; z-index: 9999; border-radius: 6px; box-shadow: 0 10px 25px #000; pointer-events: none; }
        .procurado-item:hover .ficha-hover { display: block; }

        .editor-section { background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        input, textarea, select { width: 100%; background: #0f1014; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 12px; box-sizing: border-box; font-family: 'Inter'; }
        .btn-publish { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: 800; text-transform: uppercase; cursor: pointer; font-family: 'Oswald'; font-size: 1.1rem; transition: 0.2s; }
        .btn-publish:hover { background: #a00000; }
        .hidden { display: none !important; }
        .admin-btn-del { background: #600; color: white; border: none; padding: 4px 8px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; margin-top: 5px; font-family: 'Oswald'; margin-right: 5px; }
        .admin-btn-edit { background: #0044cc; color: white; border: none; padding: 4px 8px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; margin-top: 5px; font-family: 'Oswald'; }
        
        .stat-icon { color: var(--primary); font-size: 0.9rem; margin-right: 5px; }
        .stats-area { font-size: 0.8rem; color: #888; margin-top: 15px; display: flex; gap: 15px; align-items: center; }
        
        .comment-section { margin-top: 50px; border-top: 1px solid #333; padding-top: 30px; }
        .comment-item { background: #2a2d37; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 3px solid var(--primary); }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .comment-author { font-weight: bold; color: #fff; }
        .comment-date { color: #888; font-size: 0.75rem; }
        .comment-text { font-size: 0.95rem; color: #ccc; line-height: 1.4; }
        .comment-form { background: #15161c; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #2a2d37; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="top-bar">
        <div class="logo-main" onclick="window.location.reload()"><img src="ChatGPT Image 12 de mai. de 2026, 15_45_01.png"></div>
        <div class="user-area">
            <button class="login-btn" id="auth-btn" onclick="handleAuth()">Acesso Redação</button>
            <div style="text-align:right; font-family: 'Oswald';">
                <div id="current-time" style="color: #fff; font-size: 1.1rem;">00:00</div>
                <div id="current-date" style="font-size: 0.7rem; color: var(--text-gray);">DATA</div>
            </div>
        </div>
    </div>

    <nav class="nav-container" id="filter-nav">
        <button class="nav-btn active" onclick="filterNews('all', this)"><i class="fa-solid fa-house"></i> Início</button>
        <button class="nav-btn" onclick="filterNews('Plantão Policial', this)"><i class="fa-solid fa-shield-halved"></i> Policial</button>
        <button class="nav-btn" onclick="filterNews('Esportes', this)"><i class="fa-solid fa-trophy"></i> Esportes</button>
        <button class="nav-btn" onclick="filterNews('Cotidiano', this)"><i class="fa-solid fa-city"></i> Cotidiano</button>
        <button class="nav-btn" onclick="filterNews('Opinião', this)"><i class="fa-solid fa-pen"></i> Opinião</button>
    </nav>

    <div class="main-layout">
        <main>
            <div id="pagina-home"><div id="feed-page"></div></div>

            <div id="pagina-noticia-aberta" class="hidden">
                <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <button class="nav-btn" onclick="voltarHome()" style="background:var(--primary)"><i class="fa-solid fa-arrow-left"></i> VOLTAR</button>
                    <button class="nav-btn" onclick="changeFontSize(0.1)">A+</button>
                    <button class="nav-btn" onclick="changeFontSize(-0.1)">A-</button>
                </div>
                <div id="conteudo-aberto" class="news-card" style="padding:40px; cursor:default;"></div>
            </div>

            <div id="editor-page" class="editor-section hidden">
                <div style="margin-bottom:20px; display: flex; gap: 10px;">
                    <button class="nav-btn active" id="tab-noticia" onclick="switchTab('noticia')"><i class="fa-solid fa-newspaper"></i> Matéria</button>
                    <button class="nav-btn" id="tab-anuncio" onclick="switchTab('anuncio')"><i class="fa-solid fa-bullhorn"></i> Anúncio</button>
                    <button class="nav-btn" id="tab-procurado" onclick="switchTab('procurado')"><i class="fa-solid fa-user-secret"></i> Procurado</button>
                </div>

                <form id="form-noticia">
                    <input type="hidden" id="edit-id-article">
                    <input type="text" id="title" placeholder="Título da Matéria" required>
                    <select id="category">
                        <option value="Plantão Policial">Plantão Policial</option>
                        <option value="Esportes">Esportes</option>
                        <option value="Cotidiano">Cotidiano</option>
                        <option value="Opinião">Opinião</option>
                    </select>
                    <textarea id="content" rows="12" placeholder="Escreva aqui. Use [IMG1], [IMG2] etc para posicionar as imagens no meio do texto." required></textarea>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="url" id="img1" placeholder="URL Imagem 1">
                        <input type="url" id="img2" placeholder="URL Imagem 2">
                        <input type="url" id="img3" placeholder="URL Imagem 3">
                        <input type="url" id="img4" placeholder="URL Imagem 4">
                    </div>
                    <button type="submit" id="btn-save-article" class="btn-publish">Publicar Matéria</button>
                </form>

                <form id="form-anuncio" class="hidden">
                    <input type="text" id="ad-brand" placeholder="Empresa Patrocinadora" required>
                    <input type="url" id="ad-img" placeholder="URL do Banner" required>
                    <button type="submit" class="btn-publish">Salvar Anúncio</button>
                </form>

                <form id="form-procurado" class="hidden">
                    <input type="text" id="w-name" placeholder="Nome do Meliante" required>
                    <input type="text" id="w-status" placeholder="Status (ex: PROCURADO)">
                    <input type="url" id="w-img" placeholder="URL da Foto">
                    <input type="text" id="w-crime" placeholder="Crimes Cometidos">
                    <input type="text" id="w-reward" placeholder="Recompensa">
                    <button type="submit" class="btn-publish">Salvar na Lista</button>
                </form>

                <button onclick="voltarHome()" style="margin-top:15px; width:100%; padding:10px; background:#333; color:#fff; border:none; cursor:pointer; font-family:'Oswald'"><i class="fa-solid fa-xmark"></i> Sair do Painel</button>
            </div>
        </main>

        <aside id="main-sidebar">
            <div class="sidebar-widget"><div class="widget-title"><i class="fa-solid fa-bullhorn" style="color: var(--primary);"></i> PATROCÍNIO:</div><div id="ads-container"></div></div>
            <div class="sidebar-widget"><div class="widget-title"><i class="fa-solid fa-handcuffs" style="color: var(--primary);"></i> PROCURADOS:</div><div id="wanted-container"></div></div>
        </aside>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTYu6dC3Iyz-qtjHKvLaq-B_4qXMb1C4w",
            authDomain: "weazelfm-dfb2e.firebaseapp.com",
            databaseURL: "https://weazelfm-dfb2e-default-rtdb.firebaseio.com",
            projectId: "weazelfm-dfb2e",
            storageBucket: "weazelfm-dfb2e.firebasestorage.app",
            messagingSenderId: "70517176119",
            appId: "1:70517176119:web:523e4e13cfedd0e0018cb2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isLogged = false, loggedUser = sessionStorage.getItem('weazel_user') || "", fontSize = 1.1, currentCategory = 'all';
        let currentCommentListener = null;

        // BLOQUEIO TOTAL: F12, CTRL+U, INSPEÇÃO E BOTÃO DIREITO
        window.addEventListener('contextmenu', e => e.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
        window.addEventListener('keydown', e => {
            if (e.key === "F12" || e.keyCode === 123) { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 's' || e.keyCode === 85 || e.keyCode === 83)) { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
        }, { capture: true });

        document.onselectstart = () => false;

        if(loggedUser) { isLogged = true; document.getElementById('auth-btn').innerText = loggedUser.toUpperCase(); }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'short'}).toUpperCase();
        }
        setInterval(updateTime, 1000); updateTime();

        function handleAuth() {
            if(isLogged) showPage('editor');
            else {
                const p = prompt("Senha:"); if(p === "andrewgallowaywfm") {
                    const n = prompt("Seu Nome:"); if(n) { isLogged = true; loggedUser = n; sessionStorage.setItem('weazel_user', n); document.getElementById('auth-btn').innerText = n.toUpperCase(); showPage('editor'); }
                }
            }
        }

        function showPage(p) {
            document.getElementById('pagina-home').classList.add('hidden');
            document.getElementById('pagina-noticia-aberta').classList.add('hidden');
            document.getElementById('editor-page').classList.add('hidden');
            document.getElementById('main-sidebar').classList.remove('hidden');
            if(p === 'feed') document.getElementById('pagina-home').classList.remove('hidden');
            if(p === 'aberta') { document.getElementById('pagina-noticia-aberta').classList.remove('hidden'); document.getElementById('main-sidebar').classList.add('hidden'); }
            if(p === 'editor') { document.getElementById('editor-page').classList.remove('hidden'); document.getElementById('main-sidebar').classList.add('hidden'); }
            window.scrollTo(0,0);
        }

        function switchTab(t) {
            document.getElementById('form-noticia').classList.add('hidden');
            document.getElementById('form-anuncio').classList.add('hidden');
            document.getElementById('form-procurado').classList.add('hidden');
            document.querySelectorAll('.editor-section .nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('form-'+t).classList.remove('hidden');
        }

        db.ref('articles').on('value', s => renderFeed(s.val()));

        function renderFeed(data) {
            const feed = document.getElementById('feed-page'); feed.innerHTML = '';
            if(!data) return;
            const items = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b)=>b.timestamp-a.timestamp);
            const filtered = currentCategory === 'all' ? items : items.filter(i => i.category === currentCategory);

            filtered.forEach(item => {
                const viewCount = item.views || 0;
                const commentCount = item.comments ? Object.keys(item.comments).length : 0;

                feed.innerHTML += `
                <div class="news-card" onclick="abrirMateria('${item.id}')">
                    <span class="badge">${item.category}</span>
                    <h2 class="news-title">${item.title}</h2>
                    <div class="news-summary">${item.content.substring(0, 180)}...</div>
                    <div class="stats-area">
                        <span><i class="fa-solid fa-clock stat-icon" style="color:#666"></i> ${item.date} por ${item.author}</span>
                        <span><i class="fa-solid fa-eye stat-icon"></i> ${viewCount}</span>
                        <span><i class="fa-solid fa-comments stat-icon"></i> ${commentCount}</span>
                    </div>
                    ${isLogged ? `
                        <div style="margin-top: 10px;">
                            <button class="admin-btn-del" onclick="event.stopPropagation(); db.ref('articles/${item.id}').remove()">Apagar</button>
                            <button class="admin-btn-edit" onclick="event.stopPropagation(); prepararEdicaoMateria('${item.id}')">Editar</button>
                        </div>
                    ` : ''}
                </div>`;
            });
        }

        function prepararEdicaoMateria(id) {
            db.ref('articles/'+id).once('value', s => {
                const item = s.val();
                document.getElementById('edit-id-article').value = id;
                document.getElementById('title').value = item.title;
                document.getElementById('category').value = item.category;
                document.getElementById('content').value = item.content;
                document.getElementById('img1').value = item.images ? (item.images[0] || '') : '';
                document.getElementById('img2').value = item.images ? (item.images[1] || '') : '';
                document.getElementById('img3').value = item.images ? (item.images[2] || '') : '';
                document.getElementById('img4').value = item.images ? (item.images[3] || '') : '';
                document.getElementById('btn-save-article').innerText = "Atualizar Matéria";
                showPage('editor'); switchTab('noticia');
            });
        }

        function filterNews(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('#filter-nav .nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            db.ref('articles').once('value', s => renderFeed(s.val()));
            showPage('feed');
        }

        function abrirMateria(id) {
            if(currentCommentListener) { currentCommentListener.off(); }

            db.ref('articles/'+id).once('value', s => {
                const item = s.val();
                
                let newViews = (item.views || 0) + 1;
                db.ref('articles/'+id).update({ views: newViews });

                let texto = item.content.replace(/\n/g, '<br>');
                if(item.images) {
                    item.images.forEach((url, i) => {
                        if(url) {
                            const tag = `[IMG${i+1}]`;
                            const imgHtml = `<img src="${url}" class="inline-img">`;
                            texto = texto.includes(tag) ? texto.replace(tag, imgHtml) : texto + imgHtml;
                        }
                    });
                }
                
                document.getElementById('conteudo-aberto').innerHTML = `
                    <span class="badge">${item.category}</span>
                    <h1 class="news-title" style="font-size:3rem">${item.title}</h1>
                    <div class="stats-area" style="font-size: 1rem; color: #aaa;">
                        <span><i class="fa-solid fa-user stat-icon" style="color:#666"></i> ${item.author}</span>
                        <span><i class="fa-regular fa-calendar stat-icon" style="color:#666"></i> ${item.date}</span>
                        <span><i class="fa-solid fa-eye stat-icon"></i> ${newViews} Acessos</span>
                    </div>
                    <hr style="border:0; border-top:1px solid #333; margin:20px 0">
                    <div class="content-body" style="font-size:${fontSize}rem">${texto}</div>
                    
                    <div class="comment-section">
                        <h2 style="font-family:'Oswald'; border-bottom: 2px solid var(--primary); padding-bottom: 5px; display: inline-block;">COMENTÁRIOS</h2>
                        
                        <form class="comment-form" onsubmit="enviarComentario(event, '${id}')">
                            <input type="text" id="com-nome" placeholder="Seu nome ou apelido" required style="max-width: 300px;">
                            <textarea id="com-texto" rows="3" placeholder="O que você achou da matéria?" required></textarea>
                            <button type="submit" class="btn-publish" style="width: auto; padding: 10px 25px;">Enviar Comentário</button>
                        </form>

                        <div id="lista-comentarios">
                            <div style="color:#666; font-style:italic;">Carregando comentários...</div>
                        </div>
                    </div>
                `;
                
                showPage('aberta');

                currentCommentListener = db.ref('articles/'+id+'/comments');
                currentCommentListener.on('value', snap => {
                    const cList = document.getElementById('lista-comentarios');
                    if(!cList) return;
                    cList.innerHTML = '';
                    const coms = snap.val();
                    if(coms) {
                        const arr = Object.keys(coms).map(k => ({id:k, ...coms[k]})).sort((a,b)=>b.timestamp-a.timestamp);
                        arr.forEach(c => {
                            cList.innerHTML += `
                            <div class="comment-item" id="comment-${c.id}">
                                <div class="comment-header">
                                    <span class="comment-author">${c.nome}</span>
                                    <span class="comment-date">${c.data}</span>
                                </div>
                                <div class="comment-text" id="text-${c.id}">${c.texto}</div>
                                ${isLogged ? `
                                <div style="margin-top: 10px;">
                                    <button class="admin-btn-del" onclick="apagarComentario('${id}', '${c.id}')">Apagar</button>
                                    <button class="admin-btn-edit" onclick="editarComentario('${id}', '${c.id}')">Editar</button>
                                </div>
                                ` : ''}
                            </div>`;
                        });
                    } else {
                        cList.innerHTML = '<div style="color:#666; font-style:italic;">Nenhum comentário ainda. Seja o primeiro a comentar!</div>';
                    }
                });
            });
        }

        window.enviarComentario = function(e, articleId) {
            e.preventDefault();
            const nomeStr = document.getElementById('com-nome').value;
            const textoStr = document.getElementById('com-texto').value;
            const now = new Date();
            const dataStr = now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

            db.ref('articles/'+articleId+'/comments').push({
                nome: nomeStr,
                texto: textoStr,
                data: dataStr,
                timestamp: Date.now()
            });

            document.getElementById('com-texto').value = ''; 
        }

        // NOVAS FUNÇÕES PARA O ADMINISTRADOR GERENCIAR COMENTÁRIOS
        window.apagarComentario = function(articleId, commentId) {
            if(confirm("Tem certeza que deseja apagar este comentário?")) {
                db.ref('articles/' + articleId + '/comments/' + commentId).remove();
            }
        }

        window.editarComentario = function(articleId, commentId) {
            const currentTextElement = document.getElementById('text-' + commentId);
            const currentText = currentTextElement ? currentTextElement.innerText : "";
            const novoTexto = prompt("Edite o comentário (ou apague e digite outro):", currentText.replace(" (Editado pela Moderação)", ""));
            
            if(novoTexto !== null && novoTexto.trim() !== "") {
                db.ref('articles/' + articleId + '/comments/' + commentId).update({
                    texto: novoTexto + " (Editado pela Moderação)"
                });
            }
        }

        document.getElementById('form-noticia').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id-article').value;
            const data = {
                title: document.getElementById('title').value, category: document.getElementById('category').value,
                content: document.getElementById('content').value, author: loggedUser, timestamp: Date.now(), date: new Date().toLocaleDateString(),
                images: [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value, document.getElementById('img4').value]
            };
            if(id) db.ref('articles/'+id).update(data); else db.ref('articles').push(data);
            this.reset(); document.getElementById('edit-id-article').value = ""; document.getElementById('btn-save-article').innerText = "Publicar Matéria";
            alert("Sucesso!");
        };

        document.getElementById('form-anuncio').onsubmit = function(e) {
            e.preventDefault();
            db.ref('ads').push({ brand: document.getElementById('ad-brand').value, img: document.getElementById('ad-img').value });
            this.reset(); alert("Anúncio salvo!");
        };

        document.getElementById('form-procurado').onsubmit = function(e) {
            e.preventDefault();
            db.ref('wanted').push({
                name: document.getElementById('w-name').value, status: document.getElementById('w-status').value,
                img: document.getElementById('w-img').value, crime: document.getElementById('w-crime').value,
                reward: document.getElementById('w-reward').value
            });
            this.reset(); alert("Procurado adicionado!");
        };

        db.ref('ads').on('value', s => {
            const cont = document.getElementById('ads-container'); cont.innerHTML = '';
            Object.keys(s.val() || {}).forEach(k => {
                const a = s.val()[k];
                cont.innerHTML += `<div style="margin-bottom:20px"><span class="ad-brand">${a.brand}</span><img src="${a.img}" class="anuncio-img">${isLogged ? `<button class="admin-btn-del" onclick="db.ref('ads/${k}').remove()">Remover</button>` : ''}</div>`;
            });
        });

        db.ref('wanted').on('value', s => {
            const cont = document.getElementById('wanted-container'); cont.innerHTML = '';
            Object.keys(s.val() || {}).forEach(k => {
                const w = s.val()[k];
                cont.innerHTML += `<div class="procurado-item"><img src="${w.img}" class="procurado-img"><div><div style="font-family:'Oswald'; font-size:0.9rem">${w.name}</div><div style="color:red; font-size:0.7rem; font-weight:bold">${w.status}</div></div><div class="ficha-hover"><b style="color:red">CRIMES:</b> ${w.crime}<br><br><b style="color:gold">RECOMPENSA:</b> ${w.reward}</div>${isLogged ? `<button class="admin-btn-del" onclick="db.ref('wanted/${k}').remove()">X</button>` : ''}</div>`;
            });
        });

        function voltarHome() {
            if(currentCommentListener) { currentCommentListener.off(); currentCommentListener = null; }
            showPage('feed'); 
        }
        
        function changeFontSize(v) {
            fontSize += v;
            document.querySelector('#conteudo-aberto .content-body').style.fontSize = fontSize + 'rem';
        }
    </script>
</body>
</html>
