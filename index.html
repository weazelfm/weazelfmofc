<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weazel FM, A rádio da cidade</title>
    <link rel="icon" type="image/png" href="ChatGPT Image 12 de mai. de 2026, 15_45_01.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #cc0000; --bg-dark: #0f1014; --card-bg: #1c1e26; --text-gray: #a0a0a0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; overflow-x: hidden; }
        
        .top-bar { background: rgba(0,0,0,0.9); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d37; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-main img { height: 55px; cursor: pointer; }
        .user-area { display: flex; align-items: center; gap: 25px; }
        .login-btn { background: #2a2d37; color: #fff; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; font-weight: bold; }
        .login-btn:hover { background: var(--primary); border-color: var(--primary); }

        .main-layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 30px; padding: 0 20px; }
        .sidebar-widget { background: var(--card-bg); border: 1px solid #2a2d37; border-radius: 8px; padding: 20px; margin-bottom: 30px; margin-top: 20px; }
        .widget-title { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; font-size: 1.2rem; }
        
        .ad-brand { font-family: 'Oswald'; font-size: 0.9rem; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .anuncio-img { width: 100%; border-radius: 4px; border: 1px solid #333; cursor: default; }

        .procurado-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #2a2d37; padding-bottom: 10px; position: relative; }
        .procurado-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: #000; cursor: help; }
        .ficha-hover { display: none; position: absolute; right: calc(100% + 20px); top: 0; background: #0a0a0c; border: 2px solid var(--primary); padding: 15px; width: 250px; z-index: 9999; border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.9); font-size: 0.8rem; pointer-events: none; }
        .procurado-item:hover .ficha-hover { display: block; }

        .nav-container { max-width: 1200px; margin: 30px auto; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn { background: var(--card-bg); border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-family: 'Oswald'; text-transform: uppercase; }
        .nav-btn.active { background: var(--primary); border-color: var(--primary); }
        
        .news-card { background: var(--card-bg); border-radius: 10px; border: 1px solid #2a2d37; margin-bottom: 30px; overflow: hidden; cursor: pointer; }
        .badge { background: var(--primary); padding: 4px 12px; border-radius: 3px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; font-family: 'Oswald'; }
        .news-title { font-family: 'Oswald'; font-size: 1.8rem; margin: 10px 0; color: #fff; line-height: 1.1; }
        
        .news-img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .news-img-item { width: 100%; border-radius: 6px; border: 1px solid #333; }

        .editor-section { background: var(--card-bg); padding: 40px; border-radius: 12px; margin-top: 20px; }
        .tab-btn { padding: 10px 20px; background: #111; color: #666; border: 1px solid #333; cursor: pointer; font-family: 'Oswald'; margin-right: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }

        input, textarea, select { width: 100%; background: #0f1014; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-publish { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: 800; text-transform: uppercase; cursor: pointer; font-family: 'Oswald'; font-size: 1.1rem; }
        
        .hidden { display: none !important; }
        .admin-btn-del { background: #600; color: white; border: none; padding: 4px 8px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; margin-top: 5px; font-family: 'Oswald'; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-main" onclick="window.location.reload()"><img src="ChatGPT Image 12 de mai. de 2026, 15_45_01.png"></div>
        <div class="user-area">
            <button class="login-btn" id="auth-btn" onclick="handleAuth()">Acesso Redação</button>
            <div style="text-align:right; font-family: 'Oswald';">
                <div id="current-time" style="color: #fff; font-size: 1.1rem;">00:00</div>
                <div id="current-date" style="font-size: 0.7rem; color: var(--text-gray);">DATA</div>
            </div>
        </div>
    </div>

    <nav class="nav-container">
        <button class="nav-btn active" onclick="filterNews('all', this)">📌 Início</button>
        <button class="nav-btn" onclick="filterNews('Plantão Policial', this)">🚔 Policial</button>
        <button class="nav-btn" onclick="filterNews('Esportes', this)">🏀 Esportes</button>
        <button class="nav-btn" onclick="filterNews('Cotidiano', this)">🌆 Cotidiano</button>
    </nav>

    <div class="main-layout">
        <main>
            <div id="pagina-home"><div id="feed-page"></div></div>
            <div id="pagina-noticia-aberta" class="hidden">
                <div style="margin-bottom: 20px;">
                    <button class="nav-btn" onclick="voltarHome()" style="background:var(--primary)">VOLTAR</button>
                    <button class="nav-btn" onclick="changeFontSize(0.1)">A+</button>
                    <button class="nav-btn" onclick="changeFontSize(-0.1)">A-</button>
                </div>
                <div id="conteudo-aberto" class="news-card" style="padding:40px; cursor:default;"></div>
            </div>

            <div id="editor-page" class="editor-section hidden">
                <div style="margin-bottom:20px">
                    <button class="tab-btn active" onclick="switchTab('noticia')">Matéria</button>
                    <button class="tab-btn" onclick="switchTab('anuncio')">Anúncio</button>
                    <button class="tab-btn" onclick="switchTab('procurado')">Procurado</button>
                </div>
                <form id="form-noticia">
                    <input type="text" id="title" placeholder="Título" required>
                    <select id="category"><option value="Plantão Policial">Plantão Policial</option><option value="Esportes">Esportes</option></select>
                    <textarea id="content" rows="8" placeholder="Texto da matéria" required></textarea>
                    <input type="url" id="img1" placeholder="URL Imagem 1"><input type="url" id="img2" placeholder="URL Imagem 2">
                    <input type="url" id="img3" placeholder="URL Imagem 3"><input type="url" id="img4" placeholder="URL Imagem 4">
                    <button type="submit" class="btn-publish">Publicar</button>
                </form>
                <form id="form-anuncio" class="hidden">
                    <input type="text" id="ad-brand" placeholder="Nome da Empresa (Ex: Pops Diner)" required>
                    <input type="url" id="ad-img" placeholder="URL do Banner" required>
                    <button type="submit" class="btn-publish">Salvar Anúncio</button>
                </form>
                <button onclick="voltarHome()" style="margin-top:10px; width:100%; padding:10px; background:#333; color:#fff; border:none; cursor:pointer">Sair do Painel</button>
            </div>
        </main>

        <aside id="main-sidebar">
            <div class="sidebar-widget"><div class="widget-title">📢 PATROCÍNIO:</div><div id="ads-container"></div></div>
            <div class="sidebar-widget"><div class="widget-title">🚔 PROCURADOS:</div><div id="wanted-container"></div></div>
        </aside>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTYu6dC3Iyz-qtjHKvLaq-B_4qXMb1C4w",
            authDomain: "weazelfm-dfb2e.firebaseapp.com",
            databaseURL: "https://weazelfm-dfb2e-default-rtdb.firebaseio.com",
            projectId: "weazelfm-dfb2e",
            storageBucket: "weazelfm-dfb2e.firebasestorage.app",
            messagingSenderId: "70517176119",
            appId: "1:70517176119:web:523e4e13cfedd0e0018cb2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isLogged = false, loggedUser = sessionStorage.getItem('weazel_user') || "", fontSize = 1.1;

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'short'}).toUpperCase();
        }
        setInterval(updateTime, 1000); updateTime();

        function handleAuth() {
            if(isLogged) showPage('editor');
            else {
                const p = prompt("Senha:"); if(p === "andrewgallowaywfm") {
                    const n = prompt("Nome:"); if(n) { isLogged = true; loggedUser = n; sessionStorage.setItem('weazel_user', n); showPage('editor'); }
                }
            }
        }

        function showPage(p) {
            document.getElementById('pagina-home').classList.add('hidden');
            document.getElementById('pagina-noticia-aberta').classList.add('hidden');
            document.getElementById('editor-page').classList.add('hidden');
            document.getElementById('main-sidebar').classList.remove('hidden');
            if(p === 'feed') document.getElementById('pagina-home').classList.remove('hidden');
            if(p === 'aberta') { document.getElementById('pagina-noticia-aberta').classList.remove('hidden'); document.getElementById('main-sidebar').classList.add('hidden'); }
            if(p === 'editor') { document.getElementById('editor-page').classList.remove('hidden'); document.getElementById('main-sidebar').classList.add('hidden'); }
            window.scrollTo(0,0);
        }

        function switchTab(t) {
            document.getElementById('form-noticia').classList.add('hidden');
            document.getElementById('form-anuncio').classList.add('hidden');
            if(t === 'noticia') document.getElementById('form-noticia').classList.remove('hidden');
            if(t === 'anuncio') document.getElementById('form-anuncio').classList.remove('hidden');
        }

        // CARREGAR NOTICIAS
        db.ref('articles').on('value', s => {
            const feed = document.getElementById('feed-page'); feed.innerHTML = '';
            const items = Object.keys(s.val() || {}).map(k => ({id:k, ...s.val()[k]})).sort((a,b)=>b.timestamp-a.timestamp);
            items.forEach(item => {
                feed.innerHTML += `<div class="news-card" onclick="abrirMateria('${item.id}')" style="padding:25px">
                    <span class="badge">${item.category}</span>
                    <h2 class="news-title">${item.title}</h2>
                    ${isLogged ? `<button class="admin-btn-del" onclick="event.stopPropagation(); db.ref('articles/${item.id}').remove()">Apagar</button>` : ''}
                </div>`;
            });
        });

        function abrirMateria(id) {
            db.ref('articles/'+id).once('value', s => {
                const item = s.val();
                let imgHtml = '<div class="news-img-grid">';
                if(item.images) item.images.forEach(img => { if(img) imgHtml += `<img src="${img}" class="news-img-item">`; });
                imgHtml += '</div>';

                document.getElementById('conteudo-aberto').innerHTML = `
                    <span class="badge">${item.category}</span>
                    <h1 class="news-title" style="font-size:3rem">${item.title}</h1>
                    <p style="color:#666">Por ${item.author} em ${item.date}</p>
                    ${imgHtml}
                    <div style="line-height:1.6; font-size:${fontSize}rem">${item.content.replace(/\n/g, '<br>')}</div>`;
                showPage('aberta');
            });
        }

        // FORMULARIOS
        document.getElementById('form-noticia').onsubmit = function(e) {
            e.preventDefault();
            db.ref('articles').push({
                title: document.getElementById('title').value, category: document.getElementById('category').value,
                content: document.getElementById('content').value, author: loggedUser, timestamp: Date.now(), date: new Date().toLocaleDateString(),
                images: [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value, document.getElementById('img4').value]
            });
            this.reset(); alert("Postado!");
        };

        document.getElementById('form-anuncio').onsubmit = function(e) {
            e.preventDefault();
            db.ref('ads').push({ brand: document.getElementById('ad-brand').value, img: document.getElementById('ad-img').value });
            this.reset(); alert("Anúncio Salvo!");
        };

        db.ref('ads').on('value', s => {
            const cont = document.getElementById('ads-container'); cont.innerHTML = '';
            Object.keys(s.val() || {}).forEach(k => {
                const a = s.val()[k];
                cont.innerHTML += `<div style="margin-bottom:20px;">
                    <span class="ad-brand">${a.brand || 'ANÚNCIO'}</span>
                    <img src="${a.img}" class="anuncio-img">
                    ${isLogged ? `<button class="admin-btn-del" onclick="db.ref('ads/${k}').remove()">Remover</button>` : ''}
                </div>`;
            });
        });

        function filterNews(c, b) {
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
            // Lógica de filtro aqui (mesma do feed)...
            showPage('feed');
        }

        function voltarHome() { showPage('feed'); }
        function changeFontSize(v) { fontSize += v; document.getElementById('conteudo-aberto').style.fontSize = fontSize + 'rem'; }
    </script>
</body>
</html>
