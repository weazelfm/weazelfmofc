<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="ChatGPT Image 12 de mai. de 2026, 15_45_01.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEAZEL FM, A VOZ DA LIBERDADE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #cc0000; --bg-dark: #0f1014; --card-bg: #1c1e26; --text-gray: #a0a0a0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; overflow-x: hidden; }
        
        /* TOP BAR */
        .top-bar { background: rgba(0,0,0,0.9); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d37; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-main img { height: 55px; cursor: pointer; }
        .user-area { display: flex; align-items: center; gap: 25px; }
        .login-btn { background: #2a2d37; color: #fff; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; font-weight: bold; }
        .login-btn:hover { background: var(--primary); border-color: var(--primary); }
        
        /* LAYOUT E SIDEBAR */
        .main-layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 30px; padding: 0 20px; }
        .sidebar { padding-top: 20px; }
        .sidebar-widget { background: var(--card-bg); border: 1px solid #2a2d37; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        .widget-title { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; font-size: 1.2rem; }
        
        /* PROCURADOS */
        .procurado-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #2a2d37; padding-bottom: 10px; }
        .procurado-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .procurado-info h4 { margin: 0; font-size: 0.9rem; font-family: 'Oswald'; }
        .procurado-status { font-size: 0.7rem; color: #ff4444; font-weight: bold; text-transform: uppercase; }

        /* NAVEGAÇÃO */
        .nav-container { max-width: 1200px; margin: 30px auto; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn { background: var(--card-bg); border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-family: 'Oswald'; text-transform: uppercase; transition: 0.2s; }
        .nav-btn.active, .nav-btn:hover { background: var(--primary); border-color: var(--primary); }

        /* CARDS E DESTAQUE */
        .news-card { background: var(--card-bg); border-radius: 10px; border: 1px solid #2a2d37; margin-bottom: 30px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .news-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .destaque-card { grid-column: 1 / -1; display: flex; background: linear-gradient(90deg, #1c1e26 0%, #000 100%); border: 2px solid var(--primary); }
        .destaque-card .card-content { padding: 40px; flex: 1; }
        .destaque-card .news-title { font-size: 3.5rem; }
        
        .badge { background: var(--primary); padding: 4px 12px; border-radius: 3px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; font-family: 'Oswald'; }
        .card-header { padding: 15px 25px; border-bottom: 1px solid #2a2d37; display: flex; justify-content: space-between; }
        .card-content { padding: 25px; }
        .news-title { font-family: 'Oswald'; font-size: 2rem; margin: 10px 0; color: #fff; line-height: 1.1; }
        
        /* CONTROLE DE FONTE */
        .font-controls { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-font { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-family: 'Oswald'; }

        /* FORMULÁRIO */
        .editor-section { background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid #333; }
        input, textarea, select { width: 100%; background: #0f1014; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-publish { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: 'Oswald'; }
        .btn-home-editor { background: #333; color: white; border: none; padding: 15px; width: 100%; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: 'Oswald'; margin-top: 10px; }

        .hidden { display: none; }
        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; border-top: 1px solid #222; }
        .news-img { width: 100%; border-radius: 6px; margin: 20px 0; border: 1px solid #333; }
        .admin-controls { margin-top:15px; padding-top:10px; border-top:1px solid #222; display: flex; gap: 10px; }
        .btn-admin { font-size: 0.6rem; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; color: white; font-family: 'Oswald'; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-main" onclick="window.location.reload()">
            <img src="ChatGPT Image 12 de mai. de 2026, 15_45_01.png" alt="WEAZEL FM">
        </div>
        <div class="user-area">
            <button class="login-btn" id="auth-btn" onclick="handleAuth()">Acesso Redação</button>
            <div style="text-align:right; font-family: 'Oswald';">
                <div id="current-time" style="color: #fff; font-size: 1.1rem;">00:00</div>
                <div id="current-date" style="font-size: 0.7rem; color: var(--text-gray);">DATA</div>
            </div>
        </div>
    </div>

    <nav class="nav-container" id="filter-nav">
        <button class="nav-btn active" onclick="filterNews('all', this)">📌 Início</button>
        <button class="nav-btn" onclick="filterNews('Plantão Policial', this)">🚔 Policial</button>
        <button class="nav-btn" onclick="filterNews('Esportes', this)">🏀 Esportes</button>
        <button class="nav-btn" onclick="filterNews('Cotidiano', this)">🌆 Cotidiano</button>
        <button class="nav-btn" onclick="filterNews('Entrevistas', this)">🎙️ Entrevistas</button>
        <button class="nav-btn" onclick="filterNews('Opinião', this)">✍️ Opinião</button>
    </nav>

    <div class="main-layout">
        <main class="container">
            <div id="pagina-home">
                <div id="feed-page"></div>
            </div>

            <div id="pagina-noticia-aberta" class="hidden">
                <div class="font-controls">
                    <button class="btn-font" onclick="changeFontSize(1)">A+</button>
                    <button class="btn-font" onclick="changeFontSize(-1)">A-</button>
                    <button class="btn-font" onclick="voltarHome()" style="background: var(--primary); margin-left: auto;">VOLTAR</button>
                </div>
                <div class="news-card" style="cursor: default;">
                    <div class="card-header">
                        <span id="aberto-categoria" class="badge"></span>
                        <span id="aberto-data" style="font-size:0.75rem;"></span>
                    </div>
                    <div class="card-content" id="texto-noticia">
                        <h1 id="titulo-aberto" class="news-title" style="font-size: 3rem;"></h1>
                        <span class="news-meta">Por: <strong id="autor-aberto" style="color:#fff"></strong></span>
                        <div id="conteudo-aberto" style="margin-top:25px; line-height: 1.8;"></div>
                    </div>
                </div>
            </div>

            <div id="editor-page" class="editor-section hidden">
                <h2 id="editor-title" style="font-family:'Oswald'">REDIGIR MATÉRIA</h2>
                <form id="news-form">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="author" placeholder="Nome do Jornalista" required>
                    <input type="text" id="title" placeholder="Título da matéria" required>
                    <select id="category">
                        <option value="Plantão Policial">Plantão Policial</option>
                        <option value="Esportes">Esportes</option>
                        <option value="Cotidiano">Cotidiano</option>
                        <option value="Entrevistas">Entrevistas</option>
                        <option value="Opinião">Opinião</option>
                    </select>
                    <textarea id="content" rows="10" placeholder="Conteúdo..." required></textarea>
                    <input type="url" id="img1" placeholder="URL Imagem 1">
                    <input type="url" id="img2" placeholder="URL Imagem 2">
                    <button type="submit" class="btn-publish">Publicar no Portal</button>
                    <button type="button" onclick="showPage('feed')" class="btn-home-editor">Voltar para Home</button>
                </form>
            </div>
        </main>

        <aside class="sidebar" id="main-sidebar">
            <div class="sidebar-widget">
                <div class="widget-title">📢 Anúncios</div>
                <div style="background:#000; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #333; border: 1px dashed #333;">
                    ESPAÇO DISPONÍVEL - WEAZEL FM
                </div>
            </div>

            <div class="sidebar-widget">
                <div class="widget-title">🚔 Mais Procurados</div>
                <div class="procurado-item">
                    <img src="https://via.placeholder.com/50" class="procurado-img">
                    <div class="procurado-info">
                        <h4>Desconhecido</h4>
                        <div class="procurado-status">Procurado</div>
                    </div>
                </div>
                <div class="procurado-item">
                    <img src="https://via.placeholder.com/50" class="procurado-img">
                    <div class="procurado-info">
                        <h4>Em Aberto</h4>
                        <div class="procurado-status" style="color:#aaa">Vigiliância</div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <footer>&copy; 2026 WEAZEL FM - Confirming Your Prejudices.</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTYu6dC3Iyz-qtjHKvLaq-B_4qXMb1C4w",
            authDomain: "weazelfm-dfb2e.firebaseapp.com",
            databaseURL: "https://weazelfm-dfb2e-default-rtdb.firebaseio.com",
            projectId: "weazelfm-dfb2e",
            storageBucket: "weazelfm-dfb2e.firebasestorage.app",
            messagingSenderId: "70517176119",
            appId: "1:70517176119:web:523e4e13cfedd0e0018cb2"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const newsRef = database.ref('articles');

        let isLogged = false;
        let loggedUser = "";
        let currentFontSize = 1.1;
        const PASS = "andrewgallowaywfm";

        window.onload = function() {
            const savedUser = sessionStorage.getItem('weazel_user');
            if(savedUser) {
                isLogged = true;
                loggedUser = savedUser;
                document.getElementById('auth-btn').innerText = loggedUser.toUpperCase();
                document.getElementById('author').value = loggedUser;
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'short'}).toUpperCase();
        }
        setInterval(updateTime, 1000);
        updateTime();

        function handleAuth() {
            if (isLogged) { showPage('editor'); } 
            else {
                const p = prompt("Senha da Redação:");
                if (p === PASS) {
                    const n = prompt("Seu Nome:");
                    if (n) {
                        isLogged = true; loggedUser = n;
                        sessionStorage.setItem('weazel_user', n);
                        document.getElementById('auth-btn').innerText = n.toUpperCase();
                        document.getElementById('author').value = n;
                        newsRef.once('value', s => render(s.val()));
                        showPage('editor');
                    }
                } else if(p !== null) { alert("ACESSO NEGADO!"); }
            }
        }

        function changeFontSize(delta) {
            currentFontSize += delta * 0.1;
            document.getElementById('conteudo-aberto').style.fontSize = currentFontSize + "rem";
        }

        function showPage(page) {
            document.getElementById('pagina-home').classList.toggle('hidden', page !== 'feed');
            document.getElementById('pagina-noticia-aberta').classList.add('hidden');
            document.getElementById('editor-page').classList.toggle('hidden', page !== 'editor');
            document.getElementById('filter-nav').classList.toggle('hidden', page !== 'feed');
            document.getElementById('main-sidebar').classList.toggle('hidden', page !== 'feed');
            window.scrollTo(0,0);
        }

        function voltarHome() { showPage('feed'); }

        function abrirMateria(id) {
            newsRef.child(id).once('value', (snapshot) => {
                const item = snapshot.val();
                document.getElementById('titulo-aberto').innerText = item.title;
                document.getElementById('autor-aberto').innerText = item.author;
                document.getElementById('aberto-categoria').innerText = item.category;
                document.getElementById('aberto-data').innerText = item.date;
                
                let contentHtml = '';
                const paragraphs = item.content.split('\n');
                let imgIdx = 0;
                paragraphs.forEach(p => {
                    if(p.trim()) {
                        contentHtml += `<p>${p}</p>`;
                        if(item.images && item.images[imgIdx]) {
                            contentHtml += `<img src="${item.images[imgIdx]}" class="news-img">`;
                            imgIdx++;
                        }
                    }
                });
                document.getElementById('conteudo-aberto').innerHTML = contentHtml;
                showPage('aberta');
                document.getElementById('pagina-noticia-aberta').classList.remove('hidden');
                document.getElementById('pagina-home').classList.add('hidden');
                document.getElementById('main-sidebar').classList.add('hidden');
            });
        }

        document.getElementById('news-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const postData = {
                author: document.getElementById('author').value,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                content: document.getElementById('content').value,
                images: [document.getElementById('img1').value, document.getElementById('img2').value].filter(u => u.trim() !== ""),
                date: new Date().toLocaleString('pt-BR'),
                timestamp: Date.now()
            };
            if(id) database.ref('articles/'+id).set(postData); else newsRef.push(postData);
            this.reset();
            document.getElementById('edit-id').value = '';
            if(isLogged) document.getElementById('author').value = loggedUser;
            showPage('feed');
        });

        newsRef.on('value', s => render(s.val()));

        function render(data, filter = 'all') {
            const feed = document.getElementById('feed-page');
            feed.innerHTML = '';
            if(!data) return;
            const articles = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b)=>b.timestamp - a.timestamp);
            const filtered = filter === 'all' ? articles : articles.filter(a => a.category === filter);

            filtered.forEach((item, index) => {
                const isDestaque = filter === 'all' && index === 0;
                feed.innerHTML += `
                    <div class="news-card ${isDestaque ? 'destaque-card' : ''}" onclick="abrirMateria('${item.id}')">
                        <div class="card-content">
                            <span class="badge">${item.category}</span>
                            <h1 class="news-title">${item.title}</h1>
                            <p style="color:#aaa">${item.content.substring(0, isDestaque ? 250 : 120)}...</p>
                            <span style="font-size:0.7rem; color:#555">${item.date}</span>
                            ${isLogged ? `
                                <div class="admin-controls" onclick="event.stopPropagation()">
                                    <button class="btn-admin" style="background:#444" onclick="editPost('${item.id}')">Editar</button>
                                    <button class="btn-admin" style="background:#b00" onclick="deletePost('${item.id}')">Apagar</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function filterNews(cat, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            newsRef.once('value', s => render(s.val(), cat));
        }

        function deletePost(id) { if(confirm("Apagar?")) database.ref('articles/'+id).remove(); }
        
        function editPost(id) {
            database.ref('articles/'+id).once('value', s => {
                const p = s.val();
                document.getElementById('edit-id').value = id;
                document.getElementById('author').value = p.author;
                document.getElementById('title').value = p.title;
                document.getElementById('category').value = p.category;
                document.getElementById('content').value = p.content;
                document.getElementById('img1').value = (p.images && p.images[0]) || '';
                document.getElementById('img2').value = (p.images && p.images[1]) || '';
                showPage('editor');
            });
        }

        // Proteções Anti-Kibe
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };
    </script>
</body>
</html>
